<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio HTML: Web Page</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Esercizio HTML: Web Page">
</head>

<body>
    <header>
        <nav class="navbar">
            <h1>Logo</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="banner">
            <div class="banner-content">
                <img src="https://placehold.co/600x400" alt="Banner Image">
            </div>
        </section>

        <section class="cards">
            <h2>Cards</h2>
            <div class="card-container">
                <div class="card">
                    <h3>Card 1</h3>
                    <p>Sviluppatore web appassionato di tecnologia.</p>
                </div>
                <div class="card">
                    <h3>Card 2</h3>
                    <p>Sviluppatore web appassionato di tecnologia.</p>
                </div>
                <div class="card">
                    <h3>Card 3</h3>
                    <p>Sviluppatore web appassionato di tecnologia.</p>
                </div>
            </div>

        </section>
        <section class="team">
            <h2>Team</h2>
            <div class="team-container">
                <div class="team-member">
                    <img src="https://placehold.co/150x150" alt="Team Member 1">
                    <h3>Mario Rossi</h3>
                    <p>CEO</p>
                </div>
                <div class="team-member">
                    <img src="https://placehold.co/150x150" alt="Team Member 2">
                    <h3>Luigi Bianchi</h3>
                    <p>CTO</p>
                </div>
                <div class="team-member">
                    <img src="https://placehold.co/150x150" alt="Team Member 3">
                    <h3>Giulia Verdi</h3>
                    <p>Designer</p>
                </div>
            </div>
        </section>

    </main>
    <footer>

    </footer>


</body>

</html>
